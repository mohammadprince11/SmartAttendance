<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="ZYNORA">
  <title>ZYNORA — أيقونة التطبيق</title>
  <!-- خلفية داكنة (لون النظام) بزوايا مدوّرة -->
  <rect width="512" height="512" rx="115" fill="#0a1a2e"/>
  <!-- رمز Z: نفس ألوان الأصل، مع جعل الشريطين الأفقيين الطويلين بالأبيض -->
  <svg x="112" y="112" width="288" height="288" viewBox="0 0 1024 1024" aria-hidden="true">
    <g fill="none" fill-rule="evenodd">
      <!-- الشريط العلوي الطويل -->
      <path fill="#F7F9FB" d="M170 218h520l-112 126H58z"/>
      <!-- القطر الرئيسي (سماوي كالأصل) -->
      <path fill="#18C7BD" d="M584 294h176L360 746H184z"/>
      <!-- الوجه المائل الفاتح (سماوي كالأصل) -->
      <path fill="#42DED3" opacity=".78" d="M584 294h88L272 746h-88z"/>
      <!-- الشريط السفلي الطويل -->
      <path fill="#F7F9FB" d="M334 680h520L742 806H222z"/>
      <!-- المربع الذهبي (كالأصل) -->
      <rect x="150" y="720" width="74" height="74" rx="8" fill="#D4B36A"/>
      <!-- بكسلات البيانات (سماوي كالأصل) -->
      <rect x="650" y="184" width="62" height="62" rx="6" fill="#18C7BD"/>
      <rect x="726" y="184" width="62" height="62" rx="6" fill="#18C7BD"/>
      <rect x="802" y="184" width="62" height="62" rx="6" fill="#18C7BD"/>
      <rect x="726" y="108" width="62" height="62" rx="6" fill="#18C7BD"/>
      <rect x="802" y="108" width="62" height="62" rx="6" fill="#18C7BD"/>
      <rect x="878" y="108" width="62" height="62" rx="6" fill="#18C7BD"/>
      <rect x="802" y="32" width="62" height="62" rx="6" fill="#18C7BD"/>
      <rect x="878" y="32" width="62" height="62" rx="6" fill="#18C7BD"/>
    </g>
  </svg>
</svg>
